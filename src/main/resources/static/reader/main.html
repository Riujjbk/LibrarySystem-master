<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>读者主页</title>
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/ui-tokens.css" rel="stylesheet">
  <link href="/css/ui-components.css" rel="stylesheet">
  <link href="/css/vant-lite.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    /* 品牌标识样式 */
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    /* 统计网格布局 */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    /* 统计卡片样式 */
    .stat-item {
      background: var(--neutral-0);
      border: 1px solid var(--neutral-300);
      border-radius: var(--radius-lg);
      padding: 16px;
      text-align: center;
    }

    .stat-number {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary-600);
    }

    /* 图书卡片样式 */
    .book-card {
      background: var(--neutral-0);
      border: 1px solid var(--neutral-300);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-1);
      overflow: hidden;
    }

    /* 图书封面占位区域 */
    .book-card .cover {
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--neutral-100);
      color: var(--text-secondary);
    }

    .book-card .info {
      padding: 12px;
    }

    /* 状态标签：可借阅 */
    .status-available {
      color: #135200;
      background-color: #f6ffed;
      border: 1px solid #b7eb8f;
      border-radius: 12px;
      padding: 2px 8px;
    }

    /* 状态标签：已借出/不可借 */
    .status-borrowed {
      color: #612500;
      background-color: #fff7e6;
      border: 1px solid #ffd591;
      border-radius: 12px;
      padding: 2px 8px;
    }

    /* 提示消息框定位 */
    .toast-box {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 2000;
      display: none;
    }
  </style>
</head>

<body>
  <div class="ui-appbar">
    <div class="brand"><i class="bi bi-book"></i><span>我的图书馆</span></div>
    <div class="grow"></div>
    <div class="actions">
      <div class="avatar" id="readerAvatar"></div>
    </div>
  </div>
  <main class="van-page">
    <div class="brand"><i class="bi bi-book"></i><span>我的图书馆</span></div>

    <div class="van-card">
      <div class="van-title">概览</div>
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-number" id="borrowedCount">0</div>
          <div>已借</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="returnedCount">0</div>
          <div>已还</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="overdueCount">0</div>
          <div>逾期</div>
        </div>
        <div class="stat-item">
          <div class="stat-number" id="favoritesCount">0</div>
          <div>收藏</div>
        </div>
      </div>
    </div>

    <div class="van-card">
      <div class="van-title">图书查询</div>
      <div class="van-toolbar">
        <input id="searchInput" class="form-control van-search" placeholder="搜索书名或作者">
        <button id="searchBtn" class="btn van-button van-button--default"><i class="bi bi-search"></i> 搜索</button>
        <button id="refreshBtn" class="btn van-button van-button--default"><i class="bi bi-arrow-clockwise"></i>
          刷新</button>
      </div>
      <div id="booksContainer" class="row g-3"></div>
      <div class="van-actions">
        <button id="loadMoreBtn" class="btn van-button van-button--default">加载更多</button>
      </div>
    </div>

    <div class="toast-box" id="toastBox">
      <div id="toastMsg" class="alert" role="alert"></div>
    </div>
  </main>

  <script src="/js/jquery-3.2.1.js"></script>
  <script src="/js/bootstrap.min.js"></script>
  <script>
    // 简洁的退出菜单（读者端）
    (function setupReaderLogout() {
      var avatar = $('#readerAvatar');
      if (avatar.length === 0) return;
      var menu = $('<div class="ui-dropdown" style="display:none;"></div>');
      var logoutItem = $('<a href="#" class="item">退出登录</a>');
      menu.append(logoutItem);
      $('body').append(menu);
      function positionMenu() {
        var rect = avatar[0].getBoundingClientRect();
        var top = rect.bottom + 8;
        var menuWidth = menu.outerWidth();
        var desiredLeft = rect.right - menuWidth;
        var safeLeft = Math.max(8, Math.min(desiredLeft, window.innerWidth - menuWidth - 8));
        menu.css({ top: top + 'px', left: safeLeft + 'px' });
      }
      function doLogout() {
        localStorage.removeItem('userToken');
        localStorage.removeItem('userInfo');
        localStorage.removeItem('rememberedUser');
        window.location.href = '/index.html';
      }
      avatar.on('click', function (e) {
        e.stopPropagation();
        positionMenu();
        menu.toggle();
      });
      $(window).on('resize', function () { if (menu.is(':visible')) positionMenu(); });
      logoutItem.on('click', function (e) {
        e.preventDefault();
        menu.hide();
        doLogout();
      });
      $(document).on('click', function () {
        if (menu.is(':visible')) menu.hide();
      });
    })();

    let currentPage = 1;
    let totalPages = 1;
    const pageSize = 9;
    let myActiveBorrowed = new Set();

    $(function () {
      $.ajaxSetup({ cache: false });
      $('#searchBtn').on('click', function () { loadBooks(1); });
      $('#refreshBtn').on('click', function () { loadBooks(currentPage); loadStats(); });
      loadStats();
      loadBooks(1);
    });

    function loadStats() {
      $.get('/api/my-lends', { _t: Date.now() }, function (list) {
        const now = Date.now();
        const borrowed = (list || []).filter(l => !l.backDate && !l.back_date).length;
        const returned = (list || []).filter(l => !!(l.backDate || l.back_date)).length;
        const overdue = (list || []).filter(l => {
          const lend = new Date(l.lendDate || l.lend_date || null);
          return (!l.backDate && !l.back_date) && lend.getTime() && (now - lend.getTime() > 30 * 24 * 3600 * 1000);
        }).length;
        $('#borrowedCount').text(borrowed);
        $('#returnedCount').text(returned);
        $('#overdueCount').text(overdue);
        $('#favoritesCount').text(localStorage.getItem('favoritesCount') || '0');
      });
    }

    function loadBooks(page = 1) {
      currentPage = page;
      const q = $('#searchInput').val().trim();
      $.when(
        $.get('/api/books', { page: currentPage, size: pageSize, q, _t: Date.now() }),
        $.get('/api/my-lends', { _t: Date.now() })
      ).done(function (booksResp, lendsResp) {
        const data = booksResp[0] || {};
        const records = data.records || [];
        totalPages = data.pages || 1;
        const list = lendsResp[0] || [];
        const set = new Set();
        (list || []).forEach(function (l) {
          const bid = l.bookId || l.book_id;
          const active = !(l.backDate || l.back_date);
          if (active && bid != null) set.add(String(bid));
        });
        myActiveBorrowed = set;
        displayBooks(records, set, page === 1);
        updateLoadMore();
      });
    }

    function displayBooks(books, borrowedSet, reset) {
      const container = $('#booksContainer');
      if (reset) container.empty();
      books.forEach(book => {
        const id = book.bookId || book.book_id;
        const available = (book.number || 0) > 0;
        const mineBorrowed = borrowedSet && borrowedSet.has(String(id));
        const statusClass = (mineBorrowed || !available) ? 'status-borrowed' : 'status-available';
        const statusText = mineBorrowed ? '已借出' : (available ? '可借阅' : '已借出');
        let actionBtn = '';
        if (mineBorrowed) {
          actionBtn = `<button class="btn van-button van-button--primary" onclick="returnBook(${id})"><i class="bi bi-bookmark-check me-1"></i>归还</button>`;
        } else if (available) {
          actionBtn = `<button class="btn van-button van-button--primary" onclick="borrowBook(${id})"><i class="bi bi-bookmark-plus me-1"></i>借阅</button>`;
        } else {
          actionBtn = `<button class="btn van-button van-button--default" disabled><i class="bi bi-bookmark-plus me-1"></i>借阅</button>`;
        }
        const card = `
          <div class="col-md-4">
            <div class="book-card">
              <div class="cover"><i class="bi bi-book"></i></div>
              <div class="info">
                <div class="d-flex justify-content-between align-items-center mb-1">
                  <strong>${book.name || ''}</strong>
                  <span class="${statusClass}">${statusText}</span>
                </div>
                <div class="text-muted mb-2">作者：${book.author || ''}</div>
                <div class="d-flex justify-content-between align-items-center">
                  ${actionBtn}
                  <button class="btn van-button van-button--default" onclick="viewBookDetail(${id})"><i class="bi bi-info-circle me-1"></i>详情</button>
                </div>
              </div>
            </div>
          </div>`;
        container.append(card);
      });
    }
    function updateLoadMore() {
      if (currentPage >= totalPages) {
        $('#loadMoreBtn').hide();
      } else {
        $('#loadMoreBtn').show();
      }
    }
    $('#loadMoreBtn').on('click', function () { if (currentPage < totalPages) loadBooks(currentPage + 1); });

    function borrowBook(bookId) {
      const btn = event?.currentTarget;
      if (btn) $(btn).prop('disabled', true);
      $.post('/api/lend', { bookId })
        .done(function (res) {
          showToast(res && res.success ? '借阅成功' : (res && res.message) || '借阅失败');
        })
        .fail(function (xhr) {
          const msg = (xhr && xhr.responseJSON && xhr.responseJSON.message) || (xhr && xhr.responseText) || '借阅失败';
          showToast(msg);
        })
        .always(function () { if (btn) $(btn).prop('disabled', false); loadBooks(currentPage); loadStats(); });
    }
    function returnBook(bookId) {
      const btn = event?.currentTarget;
      if (btn) $(btn).prop('disabled', true);
      $.post('/api/return', { bookId })
        .done(function (res) {
          showToast(res && res.success ? '归还成功' : (res && res.message) || '归还失败');
        })
        .fail(function (xhr) {
          const msg = (xhr && xhr.responseJSON && xhr.responseJSON.message) || (xhr && xhr.responseText) || '归还失败';
          showToast(msg);
        })
        .always(function () { if (btn) $(btn).prop('disabled', false); loadBooks(currentPage); loadStats(); });
    }
    function viewBookDetail(bookId) { window.location.href = `/reader/book-detail.html?id=${bookId}`; }
    function showToast(message) {
      const box = $('#toastBox'); const msg = $('#toastMsg');
      msg.removeClass('alert-danger alert-success').addClass(/成功/.test(message) ? 'alert-success' : 'alert-danger');
      msg.text(message); box.stop(true, true).fadeIn(150); setTimeout(() => box.fadeOut(400), 1800);
    }
  </script>
</body>

</html>
