<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图书详情</title>
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/ui-tokens.css" rel="stylesheet">
  <link href="/css/vant-lite.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 16px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .detail-item {
      background: var(--neutral-0);
      border: 1px solid var(--neutral-300);
      border-radius: var(--radius-md);
      padding: 10px;
    }

    .intro {
      margin-top: 12px;
      color: var(--text-secondary);
    }

    @media (max-width: 992px) {
      .detail-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="van-page">
    <div class="brand"><i class="bi bi-book"></i><span>图书详情</span></div>
    <div class="van-card">
      <div class="van-title" id="title">加载中...</div>
      <div class="detail-grid" id="detailGrid"></div>
      <div class="intro" id="intro"></div>
      <div class="van-actions">
        <button class="btn van-button van-button--primary" id="lendBtn"><i
            class="bi bi-bookmark-plus me-1"></i>借阅</button>
        <button class="btn van-button van-button--default" id="returnBtn"><i
            class="bi bi-bookmark-check me-1"></i>归还</button>
        <a href="/reader/main.html" class="btn van-button van-button--default">返回</a>
      </div>
    </div>
    <div class="toast-box" id="toastBox" style="display:none">
      <div id="toastMsg" class="alert" role="alert"></div>
    </div>
  </main>
  <script src="/js/jquery-3.2.1.js"></script>
  <script src="/js/bootstrap.min.js"></script>
  <script>
    // 获取URL查询参数
    function getQuery(name) { const params = new URLSearchParams(window.location.search); return params.get(name); }

    // 显示Toast提示消息
    function showToast(message) {
      const box = $('#toastBox'); const msg = $('#toastMsg');
      msg.removeClass('alert-danger alert-success').addClass(/成功/.test(message) ? 'alert-success' : 'alert-danger');
      msg.text(message); box.stop(true, true).fadeIn(150); setTimeout(() => box.fadeOut(400), 1800);
    }

    // 渲染图书详情数据
    function render(b) {
      $('#title').text(b.name || '');
      const grid = $('#detailGrid'); grid.empty();
      const rows = [
        ['作者', b.author], ['出版社', b.publish], ['ISBN', b.isbn || b.ISBN],
        ['价格', b.price], ['库存', b.number]
      ];
      rows.forEach(r => { grid.append(`<div class="detail-item"><strong>${r[0]}：</strong>${r[1] || ''}</div>`); });
      $('#intro').text(b.introduction || '');
    }

    // 页面加载逻辑
    function load() {
      const id = getQuery('id'); if (!id) return;

      // 并发请求：获取图书详情 和 获取当前用户的借阅记录
      $.get('/api/books/' + id + '?_t=' + Date.now(), function (b) {
        render(b);
        $.get('/api/my-lends', { _t: Date.now() }, function (list) {
          // 检查当前用户是否已借阅此书（且未归还）
          const set = new Set(); (list || []).forEach(function (l) { const bid = l.bookId || l.book_id; const active = !(l.backDate || l.back_date); if (active && bid != null) set.add(String(bid)); });

          // 根据借阅状态控制按钮显示
          if (set.has(String(b.bookId || b.book_id))) { $('#lendBtn').hide(); $('#returnBtn').show(); } else { $('#returnBtn').hide(); $('#lendBtn').show(); }
        });

        // 绑定借阅按钮事件
        $('#lendBtn').off('click').on('click', function (e) {
          const btn = e.currentTarget; $(btn).prop('disabled', true);
          $.post('/api/lend', { bookId: b.bookId || b.book_id })
            .done(function (res) { showToast(res && res.success ? '借阅成功' : (res && res.message) || '借阅失败'); if (res && res.success) { $('#lendBtn').hide(); $('#returnBtn').show(); } })
            .fail(function (xhr) { const msg = (xhr && xhr.responseJSON && xhr.responseJSON.message) || (xhr && xhr.responseText) || '借阅失败'; showToast(msg); })
            .always(function () { $(btn).prop('disabled', false); });
        });

        // 绑定归还按钮事件
        $('#returnBtn').off('click').on('click', function (e) {
          const btn = e.currentTarget; $(btn).prop('disabled', true);
          $.post('/api/return', { bookId: b.bookId || b.book_id })
            .done(function (res) { showToast(res && res.success ? '归还成功' : (res && res.message) || '归还失败'); if (res && res.success) { $('#returnBtn').hide(); $('#lendBtn').show(); } })
            .fail(function (xhr) { const msg = (xhr && xhr.responseJSON && xhr.responseJSON.message) || (xhr && xhr.responseText) || '归还失败'; showToast(msg); })
            .always(function () { $(btn).prop('disabled', false); });
        });
      });
    }
    $(function () { load(); });
  </script>
</body>

</html>
