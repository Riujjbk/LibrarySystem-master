<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <!-- 设置字符集为UTF-8 -->
  <meta charset="UTF-8">
  <!-- 视口设置，确保移动端显示正常 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 图书管理系统</title>
  <!-- 引入CSS样式文件 -->
  <link href="/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/ui-tokens.css" rel="stylesheet">
  <link href="/css/ui-components.css" rel="stylesheet">
  <link href="/css/login.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
  <!-- 登录页面的主要容器 -->
  <main class="login-page">
    <!-- 左侧区域：展示欢迎信息和插图 -->
    <section class="login-left">
      <div class="brand">
        <i class="bi bi-book-fill"></i>
        <span>图书管理系统</span>
      </div>
      <h1 class="title">欢迎登录</h1>
      <p class="subtitle">使用账号密码进入系统，支持管理员与读者</p>
      <ul class="bullets">
        <li>统一后台风格，专注高效管理</li>
        <li>借阅、读者、图书全流程支持</li>
        <li>安全登录与表单校验反馈</li>
      </ul>
      <div class="illustration">
        <img src="/img/library2.jpg" alt="Library" class="img-fluid">
      </div>
    </section>
    <!-- 右侧区域：登录表单 -->
    <section class="login-right">
      <div class="card">
        <form id="loginForm">
          <div class="form-floating mb-3">
            <input type="text" class="form-control" id="username" placeholder="请输入用户名" required>
            <label for="username">用户名</label>
          </div>
          <div class="form-floating mb-3">
            <input type="password" class="form-control" id="password" placeholder="请输入密码" required>
            <label for="password">密码</label>
          </div>
          <div class="d-flex align-items-center justify-content-start mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="rememberMe">
              <label class="form-check-label" for="rememberMe">记住我</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100" id="loginBtn">登录</button>
        </form>
        <!-- 错误/成功提示框 -->
        <div id="errorAlert" class="alert mt-3" style="display:none" role="alert">
          <span id="errorMessage"></span>
        </div>
      </div>
    </section>
  </main>
  <!-- 引入JavaScript脚本 -->
  <script src="/js/jquery-3.2.1.js"></script>
  <script src="/js/bootstrap.min.js"></script>
  <script src="/js/login.js"></script>
</body>

</html>
